name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.3"
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.12

      - name: Sync dependencies (dev only)
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Pyright (strict)
        run: uv run pyright

      - name: Pytest (mocked only, no real providers)
        run: uv run pytest -q -m "not slow and not real_provider" --cov=panoptes --cov-report=term-missing
