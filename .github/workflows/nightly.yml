# Real-provider smoke. Manual-only trigger: hit the Actions tab and
# click "Run workflow" when you want to exercise the live API path.
# To make it scheduled, uncomment the `schedule:` block below — but note
# that it will need ANTHROPIC_API_KEY / OPENAI_API_KEY / GOOGLE_API_KEY
# set as repo secrets, or the smoke step will exit non-zero.
name: nightly

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 7 * * *"  # 07:00 UTC daily

jobs:
  real-provider-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.3"
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev --extra bench --extra providers-openai --extra providers-google

      - name: Real-provider smoke (5 examples)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::ANTHROPIC_API_KEY is not set. Add it to repo secrets before running this workflow."
            exit 1
          fi
          uv run pytest -q -m real_provider --maxfail=1 || true
          uv run panoptes eval humaneval --judges claude --uq split --n 5 \
            --out runs/nightly_humaneval.duckdb
          uv run panoptes report --db runs/nightly_humaneval.duckdb \
            --out runs/nightly_report.html

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: panoptes-nightly
          path: runs/
          if-no-files-found: ignore
